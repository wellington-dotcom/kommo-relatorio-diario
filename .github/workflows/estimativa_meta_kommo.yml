name: Estimativa Meta x Kommo

on:
  schedule:
    - cron: "0 11 * * *" # roda depois dos outros relatórios diários
  workflow_dispatch: {}

jobs:
  estimativa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: pip install gspread google-auth
      - name: Rodar estimativa
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python estimativa_meta_kommo.py
