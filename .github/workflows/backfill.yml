name: Backfill Mês (manual)

on:
  workflow_dispatch:   # só roda quando você clicar em "Run workflow", nunca sozinho
    inputs:
      ano:
        description: "Ano (ex: 2026)"
        required: true
        default: "2026"
      mes:
        description: "Mês (1 a 12, ex: 6 para junho)"
        required: true
        default: "6"

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar backfill do mes escolhido
        env:
          ANO: ${{ github.event.inputs.ano }}
          MES: ${{ github.event.inputs.mes }}
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_TOKEN: ${{ secrets.KOMMO_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python backfill_por_mes.py
