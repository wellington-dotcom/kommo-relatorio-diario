name: Relatorio Diario Kommo

on:
  schedule:
    # a cada 15 min, das 10h às 22h UTC = 7h às 19h em Brasília (horário comercial).
    # GitHub Actions não garante o minuto exato (pode atrasar em picos de carga),
    # mas dispara nesse ritmo o dia inteiro em vez de só uma vez.
    - cron: '*/15 10-22 * * *'
  workflow_dispatch:  # permite rodar manualmente pelo botão também

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar relatorio
        env:
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_TOKEN: ${{ secrets.KOMMO_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python relatorio_diario.py
