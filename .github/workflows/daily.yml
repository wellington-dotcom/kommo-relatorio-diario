name: Relatorio Diario Kommo

on:
  schedule:
    - cron: '0 12 * * *'  # 09:00 no horário de Brasília = 12:00 UTC
  workflow_dispatch:  # permite rodar manualmente pelo botão também

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar relatorio
        env:
          KOMMO_TOKEN: ${{ secrets.KOMMO_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python relatorio_diario.py
