name: Relatorio Diario Kommo

on:
  schedule:
      # 09:00 no horario de Brasilia = 12:00 UTC
          - cron: "0 12 * * *"
            workflow_dispatch:   # permite rodar manualmente pelo botao tambem

            jobs:
              rodar:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v4

                                  - uses: actions/setup-python@v5
                                          with:
                                                    python-version: "3.11"

                                                          - name: Instalar dependencias
                                                                  run: pip install -r requirements.txt

                                                                        - name: Rodar relatorio
                                                                                env:
                                                                                          KOMMO_TOKEN: ${{ secrets.KOMMO_TOKEN }}
                                                                                                    SHEET_ID: ${{ secrets.SHEET_ID }}
                                                                                                              GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
                                                                                                                      run: python relatorio_diario.py
