name: Sincronizar criativos Meta

on:
  schedule:
    - cron: "0 9 * * *" # todo dia às 09:00 UTC (~06:00 em Brasília)
  workflow_dispatch: {} # permite rodar manualmente pelo GitHub

permissions:
  contents: write # necessário para o passo de commit/push do creative_map.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar sincronização
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
          CREATIVE_MAP_PATH: meta_kommo_attribution/creative_map.json
        run: python meta_kommo_attribution/sync_meta_creatives.py

      - name: Commitar creative_map.json atualizado
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add meta_kommo_attribution/creative_map.json
          git diff --staged --quiet || git commit -m "Atualiza mapa de criativos [skip ci]"
          git push
